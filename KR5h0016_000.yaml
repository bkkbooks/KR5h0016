front:
  text: 太上老君說城隍感應消災集福妙經
  hash: sha256:7ccabc0dc631696b5ada061a93b5bd38f9f4c52586a9d9839c7616666ac454ab
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5h0016_HFL_000-001a, image: hfl/1063/1063-112.png}
body:
  text: 開經偈稽首皈衣城隍尊威靈烜赫鎮乾坤護國安邦扶社稷降施甘澤救生民統轄大兵巡世界賞善罰惡日同明正直公忠判生死禍淫福善闡威靈虔心欽奉消災障家道平康國圡清真經開演我今誦願賜恩光普降臨爾時太上老君道德天尊昔在大羅天上七寶宫內大集諸天諸地日月星宿三界官屬弘演無上至真玄元大道於是奇花燦爛瓊香馥郁時有真人名曰廣惠執簡長跪上白天尊曰臣觀見世間一切衆生受諸苦惱伏望天慈憐憫開宥天尊乃撫几而言此等衆生造諸惡業沉輪苦海奸貪恣縱任意所為不孝不忠不仁不義不恭三寶不禮神明小斗大稱穢踐五穀怨天怨地恨雨恨風毁謗正道惡口傷人邪淫奸盜殺害生靈致遭罪咎永失人身真人重告天尊曰世間衆生受此厄難何緣得度天尊曰善哉善哉下方生人皆由城隍申奏定數不差世間若有善信男女轉誦此經三五十遍以至百千萬遍即得消除罪業安享太平老君曰其神天地儲精山川鐘秀威靈顯赫聖道高明無黨無偏公忠正直有求必應如影隨形代天理物剪惡除凶護國保邦功施社稷溥降甘澤普救生民統轄十八真司主管百萬神將積功纍行位正城隍權掌天下威鎮萬邦真人聞說稽首頂禮天下都城隍威靈公天下十三布政城隍之神天下各府州縣城隍之神兩廊一十八司曹案官班聖衆主管天下人生死案判官主管長生注命案判官主管病症疾疫案判官主管福祿延壽案判官主管注生子孫案判官主管立應見報案判官主管看經修功德案判官主管齊戒殺生案判官主管勾押推勘案判官主管磨看陳詞案判官主管風雨龍王案判官主管追取遣送案判官主管胎卵濕化案判官主管惡鬼窮魂案判官主管善惡報應案判官主管億劫魍魎飢鬼案判官主管山林分野案判官主管六房曹吏案判官左右金甲侍衛大神前擁後從神武將軍執幡金童散花玉女隍同一切神兵將吏是時城隍哀憫世間一切衆生或有年災月厄命運蹇滯天羅地網鰥寡孤獨瘟災疫癘瘡腫疥癩官非口舌尅乏後嗣刀兵水火盜賊生産一切厄難若誦此經吾當速遣行瘟使者收瘟聖衆即除罪簿永滅惡根於是真人再告天尊曰世間若有善男子善女人廣濟陰功行諸方便施財周急愛老憐貧欽此三寶孝養父母忠於君王惜愛衣食和同六親不作非為持齊奉道善籍標名丹臺注善增延福壽世代榮昌子嗣綿永世世不絶天尊曰城隍尊神威權實重顯化無邊禱雨則甘霖蘇槁禾稼成熟祈晴則化陰成陽應時朗霽若有善男子善女人一心專志念道思真但於三元八節諸神聖誕朔望之期本命良辰持齊誦經作種種功德即得見世安樂增長福田門昌族貴光顯安榮官階進崇高之職商賈增阜盛之財舟航無波浪之驚陸程有妥安之美凡在塵壤悉歸統制於是天尊而說偈曰大哉城隍實天生德虹流華渚山嶽降靈承天稟命統制萬邦主判生死報應分明賞善罰惡不爽毫分明同日月德並乾坤皇都肅靖奸宄不生救災拔難佑國康民大都乾地廟貌尊嚴國崇祀典禮儀精禋天下欽敬率土歸心禦災捍患永鎮八方香膏綿永億萬斯春天尊說是偈已惟見龍輿鶴駕迎歸碧落之天萬聖千真各返雲霄之內城隍上聖頓首拜辭留此真經下傳世間流通讀誦若遵經㫖受福無窮諸神歡悅信受奉行太上老君說城隍感應消災集福妙經終都城隍真誥社稷古公天下正神銓福國顯忠之行禀賞善罰惡之仁都邑之主諸郡侍從所隸十三布政案判一十八司廟社萬年恩扶億劫設作福作威之柄造注生注死之權運神力以護郢川遇陰兵而驅夷寇至靈至聖乃正乃公護國保寧佑聖王威靈公感應尊神
